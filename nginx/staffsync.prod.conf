# Production API Server - api.staffsynctech.co.uk
server {
    listen 80;
    server_name api.staffsynctech.co.uk;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve uploaded files
    location /uploads {
        alias /var/www/staffsync-prod/uploads;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Production Web App - www.staffsynctech.co.uk
server {
    listen 80;
    server_name www.staffsynctech.co.uk staffsynctech.co.uk;

    root /var/www/staffsync-prod/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
