name: Deploy Production

on:
  push:
    branches: [main, production]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --production
        
      - name: Copy production env file
        env:
          ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          echo "$ENV_FILE" > .env.production
          cp .env.production .env
          
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Deploy to server
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DROPLET_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DROPLET_HOST" >> ~/.ssh/known_hosts
          
          # Deploy to production
          ssh $DROPLET_USER@$DROPLET_HOST << 'EOF'
            cd /var/www/staffsync-prod
            
            # Stash any local changes
            git stash --include-untracked
            
            # Pull latest code
            git fetch origin
            git checkout main
            git pull origin main
            
            # Install dependencies
            npm ci --production
            
            # Generate Prisma client
            npx prisma generate
            
            # Run database migrations
            npx prisma migrate deploy
            
            # Restart PM2 process
            pm2 restart staffsync-prod || pm2 start ecosystem.config.js --env production
          EOF
